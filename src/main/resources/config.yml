# | Sekcja komend wykonywanych podczac danej akcji:                             |
# | Dostepne zmienne: {PLAYER} - nick gracza, {MODERATOR} - nick sprawdzającego |
commands:
  wykryto-cheaty:
  - tempban {PLAYER} 7d &d&lSERVER-CREATORS &8» &fWykryto &5cheaty &fpodczas kontroli!
    &8(&b{MODERATOR}&8)
  
  przyznanie-sie:
  - tempban {PLAYER} 5d &d&lSERVER-CREATORS &8» &fGracz &b{PLAYER} &fprzyznal sie
    do cheatow.
  
  brak-wspolpracy:
  - tempban {PLAYER} 14d &d&lSERVER-CREATORS &8» &fBrak wspolpracy z administratorem
    &b{MODERATOR}&f.
  
  wylogowal-sie:
  - tempban {PLAYER} 14d &d&lSERVER-CREATORS &8» &fGracz &b{PLAYER} &fwylogowal sie
    podczas sprawdzania!



# | Sekcja lokalizacji:                                                                |
# | Ustawiane automatycznie przez komendy /sprawdzarka <ustaw-spawn|ustaw-sprawdzanie> |
locations:
  sprawdzarka: {}
  spawn: {}


# | Wyższa liczba = większa siła. Moderator musi mieć WIĘCEJ punktów niż sprawdzany.  |
# | Przykład: 'moderator'(50) sprawdzi 'helpera'(30), ale nie sprawdzi 'admina'(100). |
hierarchy:
  owner: 1000
  admin: 500
  moderator: 100
  helper: 50
  vip: 10
  gracz: 0
  default: 0


# | Lista komend, których gracz MOŻE używać podczas sprawdzania. |
# | Wszystkie inne komendy zostaną automatycznie zablokowane.    |
allowed-commands:
  - "/msg"
  - "/tell"
  - "/w"
  - "/r"
  - "/helpop"
  - "/przyznajesie"


gui:
  sprawdzanie:
    title: '&8Kontrola: &d{PLAYER}'
    items:
      sprawdz:
        material: COMPASS
        name: '&d&lROZPOCZNIJ SPRAWDZANIE'
        lore:
        - '&8&m------------------------'
        - '&fPrzenies gracza do &5strefy kontroli'
        - '&fi rozpocznij weryfikacje plikow.'
        - '&8&m------------------------'
        - '&bKliknij, aby wezwac gracza!'
      czysty:
        material: LIME_DYE
        name: '&a&lGRACZ JEST CZYSTY'
        lore:
        - '&8&m------------------------'
        - '&fOczysc gracza &d{PLAYER} &fz zarzutow'
        - '&fi przywroc go do gry na spawnie.'
        - '&8&m------------------------'
        - '&bKliknij, aby zakonczyc!'
      cheater:
        material: RED_DYE
        name: '&5&lWYKRYTO CHEATY'
        lore:
        - '&8&m------------------------'
        - '&fNadaj blokade na &d7 dni &fza'
        - '&fuzywanie niedozwolonych modyfikacji.'
        - '&8&m------------------------'
        - '&bKliknij, aby ukarac!'
      przyznanie:
        material: ANVIL
        name: '&b&lPRZYZNANIE SIE'
        lore:
        - '&8&m------------------------'
        - '&fGracz dobrowolnie przyznal sie.'
        - '&fKara zostaje skrocona do &d5 dni&f.'
        - '&8&m------------------------'
        - '&bKliknij, aby nadac ban!'
      wspolpraca:
        material: IRON_BARS
        name: '&4&lBRAK WSPOLPRACY'
        lore:
        - '&8&m------------------------'
        - '&fGracz odmowil wspolpracy lub'
        - '&futrudnia przebieg sprawdzania.'
        - '&8&m------------------------'
        - '&bKliknij, aby zbanowac!'
      teleport:
        material: ENDER_PEARL
        name: '&b&lTELEPORT DO SPRAWDZARKI'
        lore:
        - '&8&m------------------------'
        - '&fTeleportuj swoja postac do'
        - '&faktualnej &5strefy sprawdzania&f.'
        - '&8&m------------------------'
      historia:
        material: BOOK
        name: '&d&lHISTORIA KONTROLI'
        lore:
        - '&8&m------------------------'
        - '&fZobacz rejestr wszystkich akcji'
        - '&fpodjetych wobec gracza &d{PLAYER}&f.'
        - '&8&m------------------------'
  historie:
    title: '&8Logi: &d{PLAYER}'
    items:
      puste:
        material: BARRIER
        name: '&5&lBRAK WPISOW'
        lore:
        - '&fTen gracz nigdy nie byl sprawdzany.'
      powrot:
        material: BARRIER
        name: '&b&lPOWROT'
        lore:
        - '&fWroc do panelu glownego.'
      wpisy:
        material: PAPER
        name: '&d&lWPIS HISTORII &f#{ID}'
        lore:
        - '&fData: &b{DATE}'
        - '&fAkcja: &d{ACTION}'
        - '&fModerator: &f{MODERATOR}'
